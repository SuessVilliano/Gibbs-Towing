
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/favicon.png">
    <title>Gibbs Towing & Recovery | ATL Heavy Duty Towing & Load Shifts</title>
    <meta name="description" content="Top-rated ATL heavy duty towing and recovery. Specializing in ATL load shifts, Trans load, Commercial truck towing, and Big Rig Towing. NTTS Atlanta approved. Call (678) 508-9243.">
    <meta name="keywords" content="Atl heavy duty, towing and recovery, ATL load shifts, ATL Trans load, Commercial truck towing, ATL heavy duty winch, ATL big Rig Towing, Ntts Atlanta Gibbs Towing, Rotator Service GA">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#E31B23',
                            dark: '#050505',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        brand: ['Orbitron', 'sans-serif'],
                        script: ['Dancing Script', 'cursive'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-brand {
            font-family: 'Orbitron', sans-serif;
        }
        .font-script {
            font-family: 'Dancing Script', cursive;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #18181b;
        }
        ::-webkit-scrollbar-thumb {
            background: #E31B23;
            border-radius: 4px;
        }
        @keyframes scrollTruck {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }
        .animate-truck {
            animation: scrollTruck 12s linear infinite;
        }
        @keyframes slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-160px); }
        }
        .text-gradient-red {
            background: linear-gradient(to right, #E31B23, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
